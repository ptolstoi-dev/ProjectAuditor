name: Release and Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_publish:
    runs-on: windows-latest

    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' 

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --configuration Release --no-build --verbosity normal

    - name: Publish CLI
      run: dotnet publish src/Cli/Cli.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o ./publish/cli-windows

    - name: Zip CLI
      run: Compress-Archive -Path ./publish/cli-windows/* -DestinationPath ./publish/cli-windows.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./publish/cli-windows.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Pack ProjectAuditor.Core
      run: dotnet pack ProjectAuditor.Core/ProjectAuditor.Core.csproj --configuration Release --no-build --output ./nupkg

    - name: Publish to GitHub Packages
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
